    <text x="30" y="512">  Obsessed with detail. Driven by curiosity.</text>
    <text x="30" y="536">  Always asking why before asking how.</text>
    
    <!-- Blinking cursor -->
    <text x="30" y="576">
      <tspan fill="#ff3b5c" font-weight="bold">&gt; </tspan>
      <tspan fill="#979cfb" font-weight="bold" class="cursor">█</tspan>
    </text>
