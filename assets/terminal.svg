    </text>
    <text x="30" y="296">  Unscroll · BrowseTime</text>

    <!-- exploring -->
    <text x="30" y="336">
      <tspan fill="#ff3b5c" font-weight="bold">&gt; </tspan>
      <tspan fill="#00d2ff" font-weight="bold">exploring[]</tspan>
    </text>
    <text x="30" y="360">  design · software engineering · AI/ML</text>

    <!-- interests -->
    <text x="30" y="400">
      <tspan fill="#ff3b5c" font-weight="bold">&gt; </tspan>
