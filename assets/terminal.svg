    </text>
    <text x="30" y="424">  mathematics · sci-fi cinema · fitness · gaming · philosophy</text>

    <!-- core.md -->
    <text x="30" y="464">
      <tspan fill="#ff3b5c" font-weight="bold">&gt; </tspan>
      <tspan fill="#00d2ff" font-weight="bold">cat core.md</tspan>
    </text>
