<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b5c" />
      <stop offset="50%" stop-color="#979cfb" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
  </defs>
  <style>
    .typing {
      animation: type 5s steps(8, end) infinite;
      overflow: hidden;
    }
    .cursor-box {
      animation: slide 5s steps(8, end) infinite;
    }
    .cursor-blink {
      font-family: monospace;
      font-size: 44px;
      font-weight: bold;
      fill: #ff3b5c;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes type {
      0%, 10% { width: 0px; }
      40%, 80% { width: 225px; }
      90%, 100% { width: 0px; }
    }
    @keyframes slide {
      0%, 10% { transform: translateX(0px); }
      40%, 80% { transform: translateX(225px); }
      90%, 100% { transform: translateX(0px); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  
  <svg x="90" y="0" height="60" class="typing">
    <text x="0" y="50%" dominant-baseline="middle" text-anchor="start" font-family="monospace" font-size="44px" font-weight="bold" fill="url(#textGrad)" textLength="220" lengthAdjust="spacing">Varaxion</text>
  </svg>
  
  <g class="cursor-box">
    <text x="90" y="50%" dominant-baseline="middle" text-anchor="start" class="cursor-blink">_</text>
  </g>
</svg>
